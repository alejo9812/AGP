services:
  db:
    image: postgres:16-alpine
    container_name: agp-warehouse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agp_warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - agp-postgres-data:/var/lib/postgresql/data

volumes:
  agp-postgres-data:
