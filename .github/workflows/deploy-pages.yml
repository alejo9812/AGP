name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Python dependencies for test MVP
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r test/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace @agp/shared

      - name: Build docs
        run: npm run build --workspace @agp/docs

      - name: Build web app for Pages subpath
        run: npm run build --workspace @agp/web
        env:
          AGP_WEB_BASE: /AGP/app/

      - name: Validate static test MVP build
        run: python test/scripts/build_pruebas.py --file test/Mock_Data.xlsx --target-root test_build_validation

      - name: Compose Pages artifact
        run: |
          rm -rf pages
          mkdir -p pages/app pages/pruebas
          cp -r docs/dist/. pages/
          cp -r apps/web/dist/. pages/app/
          cp test/index.html pages/pruebas/index.html
          cp test/styles.css pages/pruebas/styles.css
          cp test/app.js pages/pruebas/app.js
          cp -r test/data pages/pruebas/data
          cp -r test/reports pages/pruebas/reports

      - name: Inject runtime API config
        run: |
          cat <<'EOF' > pages/app/app-config.js
          window.__AGP_RUNTIME_CONFIG__ = {
            apiUrl: "${{ vars.AGP_PUBLIC_API_URL }}"
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
